<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách nhân viên</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body class="container mt-4">

<h2 class="mb-3">Danh sách nhân viên</h2>
<a class="btn btn-success mb-3" th:href="@{/employees/new}">+ Thêm nhân viên</a>

<table class="table table-bordered table-sm">
    <thead class="table-light">
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Tuổi</th>
        <th>Avatar</th>
        <th>Trạng thái</th>
        <th>Phòng ban</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="emp : ${employees}">
        <td th:text="${emp.id}"></td>
        <td th:text="${emp.name}"></td>
        <td th:text="${emp.age}"></td>
        <td>
            <img th:if="${emp.avatar != null}"
                 th:src="@{'/uploads/' + ${emp.avatar}}"
                 class="rounded"
                 style="width:40px; height:40px;"/>
            <span th:if="${emp.avatar == null}" class="text-muted">No Avatar</span>
        </td>
        <td th:text="${emp.status}"></td>
        <td th:text="${emp.department.name}"></td>
    </tr>
    </tbody>
</table>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
