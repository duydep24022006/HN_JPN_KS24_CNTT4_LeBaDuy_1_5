        </div>
        <div class="col">

    </form>

    <div class="mb-3 d-flex justify-content-between">
        <!-- Form tأ¬m kiل؛؟m -->
        <form th:action="@{/employees}" method="get" class="d-flex">

            <button type="submit" class="btn btn-primary">Search</button>

        <!-- Nhأ³m nأ؛t sل؛¯p xل؛؟p -->
        <div>
            <a th:href="@{/employees(page=${currentPage}, sortField='name', sortDir=${reverseSortDir}, keyword=${keyword})}"
               class="btn btn-outline-secondary me-2">
                Sل؛¯p xل؛؟p theo Tأھn
                <span th:if="${sortField == 'name'}" th:text="${sortDir == 'asc' ? 'â†‘' : 'â†“'}"></span>
            </a>

            <a th:href="@{/employees(page=${currentPage}, sortField='age', sortDir=${reverseSortDir}, keyword=${keyword})}"

            </a>
        </div>
    </div>

    <table class="table table-bordered table-sm">

        <tr>

            <th>Tuل»•i</th>
            <th>Avatar</th>
            <th>Trل؛،ng thأ،i</th>

    </table>

    <div th:if="${employees.size() == 0}" class="mt-2 text-danger">
        Khأ´ng tأ¬m thل؛¥y nhأ¢n viأھn nأ o

    <div class="pagination mt-3">

           class="btn btn-outline-secondary me-2">Previous</a>

        <span th:each="i : ${#numbers.sequence(0, totalPages-1)}">

               th:text="${i+1}"
               th:classappend="${i == currentPage} ? 'btn btn-primary me-1' : 'btn btn-outline-primary me-1'"></a>
        </span>

        <a th:if="${currentPage < totalPages-1}"
           th:href="@{/employees(page=${currentPage+1}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}"
           class="btn btn-outline-secondary ms-2">Next</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
    </body>
    </html>
