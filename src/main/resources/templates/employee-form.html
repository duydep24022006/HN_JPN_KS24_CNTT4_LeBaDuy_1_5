<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm nhân viên mới</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body class="container mt-4">

<h3 class="mb-3">Thêm nhân viên mới</h3>

<form th:action="@{/employees/save}" th:object="${employee}" method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label for="name" class="form-label">Tên</label>
        <input type="text" th:field="*{name}" id="name" class="form-control"/>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></div>
    </div>

    <div class="mb-3">
        <label for="age" class="form-label">Tuổi</label>
        <input type="number" th:field="*{age}" id="age" class="form-control"/>
        <div th:if="${#fields.hasErrors('age')}" th:errors="*{age}" class="text-danger small"></div>
    </div>

    <div class="mb-3">
        <label for="status" class="form-label">Trạng thái</label>
        <input type="text" th:field="*{status}" id="status" class="form-control"/>
        <div th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="text-danger small"></div>
    </div>

    <div class="mb-3">
        <label for="department" class="form-label">Phòng ban</label>
        <select th:field="*{departmentId}" id="department" class="form-select">
            <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
        </select>
        <div th:if="${#fields.hasErrors('departmentId')}" th:errors="*{departmentId}" class="text-danger small"></div>
    </div>

    <div class="mb-3">
        <label for="file" class="form-label">Avatar</label>
        <input type="file" name="file" id="file" class="form-control"/>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/employees}" class="btn btn-outline-secondary">Quay lại</a>
    </div>
</form>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
